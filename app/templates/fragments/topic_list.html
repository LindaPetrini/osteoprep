{% if topics %}
<ul class="menu menu-sm w-full p-2">
  {% for topic in topics %}
  <li>
    <a href="/topic/{{ topic.slug }}"
       class="min-h-[44px] flex items-center text-sm text-base-content hover:bg-base-200 rounded-lg px-3">
      {{ topic.title_it }}
      {% if topic.content_it %}
      <span class="badge badge-success badge-xs ml-auto">Pronto</span>
      {% endif %}
    </a>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="text-center text-base-content/40 py-4 text-sm">Nessun argomento in questo soggetto.</p>
{% endif %}

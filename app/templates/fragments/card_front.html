<div id="card-container">
  <div class="card bg-base-100 shadow-sm"
       style="min-height: 200px; display: flex; align-items: center; justify-content: center; padding: 1.5rem; flex-direction: column; border: 2px solid oklch(var(--p)/0.4);">
    <p style="font-size: 1.1875rem; font-weight: 700; text-align: center; line-height: 1.5;">{{ flashcard.front_it }}</p>
    {% if flashcard.front_en %}
    <p style="font-size: 0.75rem; color: #9ca3af; margin-top: 0.5rem; text-align: center;">{{ flashcard.front_en }}</p>
    {% endif %}
  </div>
  <button
    id="flip-btn"
    class="btn btn-primary w-full"
    style="margin-top: 1rem; min-height: 44px;"
    hx-get="/review/cards/{{ srs_state.id }}/back?session_ids={{ session_ids | join(',') }}&current_index={{ current_index }}&total={{ total }}&subject={{ subject | default('') }}&mode={{ mode | default('due') }}"
    hx-target="#card-container"
    hx-swap="outerHTML">
    Mostra risposta
  </button>
  <p class="keyboard-hint" style="font-size: 0.6875rem; color: oklch(var(--bc)/0.35); text-align: center; margin-top: 0.5rem;">Premi <kbd style="background: oklch(var(--b3)); padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.6875rem;">Space</kbd> per girare</p>
  <style>@media (hover: none) { .keyboard-hint { display: none; } }</style>
</div>
<script>
(function() {
  function handleKey(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      var btn = document.getElementById('flip-btn');
      if (btn) btn.click();
    }
  }
  document.addEventListener('keydown', handleKey);
  document.addEventListener('htmx:beforeSwap', function cleanup() {
    document.removeEventListener('keydown', handleKey);
    document.removeEventListener('htmx:beforeSwap', cleanup);
  }, {once: true});
})();
</script>

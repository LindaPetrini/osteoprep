<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}OsteoPrep{% endblock %}</title>
  <link href="/static/tailwind.min.css" rel="stylesheet">
  <link href="/static/daisyui.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="min-h-screen bg-base-200">
  <div style="max-width: 560px; margin: 0 auto; padding: 1rem 1.5rem; padding-bottom: calc(4rem + env(safe-area-inset-bottom));">
    {% block content %}{% endblock %}
  </div>

  <div class="dock" style="max-width: 560px; left: 50%; transform: translateX(-50%); right: auto; border-top: 1px solid oklch(var(--b3));"></div>
  <div style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: min(560px, 100%); background: oklch(var(--b1)); border-top: 1px solid oklch(var(--b3)); display: flex; justify-content: space-around; align-items: center; height: 4rem; padding-bottom: env(safe-area-inset-bottom); z-index: 40;">
    <a href="/" style="display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.5rem 1.5rem; color: {% if active_tab == 'topics' %}oklch(var(--p)){% else %}oklch(var(--bc)/0.5){% endif %}; text-decoration: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      <span style="font-size: 0.625rem; font-weight: 500;">Argomenti</span>
    </a>

    <a href="/review" style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.5rem 1.5rem; color: {% if active_tab == 'review' %}oklch(var(--p)){% else %}oklch(var(--bc)/0.5){% endif %}; text-decoration: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <span style="font-size: 0.625rem; font-weight: 500;">Ripasso</span>
      {% if due_count is defined and due_count and due_count > 0 %}
      <span style="position: absolute; top: 2px; right: 10px; background: oklch(var(--p)); color: oklch(var(--pc)); font-size: 0.5rem; font-weight: 700; border-radius: 9999px; padding: 1px 4px; line-height: 1.4;">{{ due_count }}</span>
      {% endif %}
    </a>

    <a href="/exam" style="display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.5rem 1.5rem; color: {% if active_tab == 'exam' %}oklch(var(--p)){% else %}oklch(var(--bc)/0.5){% endif %}; text-decoration: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
      </svg>
      <span style="font-size: 0.625rem; font-weight: 500;">Esame</span>
    </a>
  </div>
</body>
</html>

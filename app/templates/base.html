<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}OsteoPrep{% endblock %}</title>
  <link href="/static/tailwind.min.css" rel="stylesheet">
  <link href="/static/daisyui.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="min-h-screen bg-base-200">
  <div style="max-width: 560px; margin: 0 auto; padding: 1rem 1.5rem; padding-bottom: calc(4rem + env(safe-area-inset-bottom));">
    {% block content %}{% endblock %}
  </div>

  <div class="dock">
    <a href="/" {% if active_tab == 'topics' %}class="dock-active"{% endif %}>
      <!-- Book/topics icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
      <span class="dock-label">Argomenti</span>
    </a>

    <a href="/review" {% if active_tab == 'review' %}class="dock-active"{% endif %} style="position: relative;">
      <!-- Cards/review icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      <span class="dock-label">Ripasso</span>
      {% if due_count is defined and due_count and due_count > 0 %}
      <span class="badge badge-primary badge-xs" style="position: absolute; top: 0; right: 0; font-size: 0.625rem;">{{ due_count }}</span>
      {% endif %}
    </a>

    <a href="/exam" {% if active_tab == 'exam' %}class="dock-active"{% endif %}>
      <!-- Clipboard/exam icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
      </svg>
      <span class="dock-label">Esame</span>
    </a>
  </div>
</body>
</html>
